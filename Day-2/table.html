<html>
    <head>
        <title>Table Work</title>
    </head>
    <body>

        <table border="5">

            <tr>
                <td colspan="4" style="color: red; text-align: center;" >Table Using Colspan and Rowspan</td>
            </tr>            
            <tr>
             
                <td colspan="4" style="color: #000; text-align: center;" >Sachin Self Store</td>
            </tr>

            <tr>
                <td style=" font-weight: 600;">Item/Dese</td>
                <td style=" font-weight: 600;">QTY</td>
                <td style=" font-weight: 600;">Price/Unit</td>
                <td style=" font-weight: 600;">Total</td>
            </tr>
            <tr>
                <td>Sugar</td>
                <td>5KG</td>
                <td>50</td>
                <td>250</td>
            </tr>
            <tr>
                <td>Cooking Oil</td>
                <td>2KG</td>
                <td>200</td>
                <td>400</td>
            </tr>
            <tr>
                <td>Soap</td>
                <td>4 Piece</td>
                <td>40</td>
                <td>160</td>
            </tr>
            <tr>
                <td colspan="3"> Sub Total</td>
                <td>810</td>
            </tr>
            <tr>
                <td colspan="2"> TAX</td>
                <td>5%</td>
                <td>41</td>
            </tr>

            <tr>
                <td colspan="3" style=" font-weight: 600;">Total Bill</td>
                <td style=" font-weight: 600;">851</td>
            </tr>

        </table>
    
    

</body>
</html>
