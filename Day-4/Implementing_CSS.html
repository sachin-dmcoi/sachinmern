<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ROBOTO MONO FONT LINKING -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


    <!-- Font Linking End's here -->
    <title>Implementing CSS</title>
    
    <!-- CSS Starts from here -->
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            font-family: roboto mono;
            color: #fff;
            background-color: #FCBD34;
        }
        .card{
            margin-top: 30px;
            margin-left: 50px;
            height: 400px;
            width: 500px;
            border: 3px solid #ffffff;
            box-shadow:#2a2a2a;
            border-radius: 15px;
            background-color: #2a2a2a;
        }
        .head{
            width: 100%;
            height: 80px;
            margin-left: 30%;
            padding-top: 20px;
        }
        .logo{
            height: 200px;
            width: 100%;
        }
        .logo img {
            height: 200px;
            width: 200px;
            border-radius: 10   px;
        }
        .footer{
            height: 70px;
            width: 100%;
        }

    </style>

</head>
<body>

    <div class="card">

        <div class="head">
            <h2>Sachin Chaudhari</h2>

        </div>
        <hr>
        <div class="logo">
 
           <img src="../IMG/logo.png">
           <!-- LOGO END HERE -->
           <div class="footer"></div>

    </div>


</body>
</html>
